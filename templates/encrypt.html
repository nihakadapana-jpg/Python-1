{% extends "base.html" %}
{% block content %}
<h2>Encryption Option</h2>
<form method="POST" enctype="multipart/form-data">
    <div class="form-group">
        <label>Select an Image for Steganography:</label>
        <div class="suggestion-grid">
            {% for img in suggestions %}
            <div class="suggestion-item" onclick="selectSuggestion('{{ img }}', this)">
                <img src="/static/suggestions/{{ img }}" alt="Suggestion">
            </div>
            {% endfor %}
        </div>
        <p style="text-align: center;">OR</p>
        <input type="file" name="image" accept="image/*">
        <input type="hidden" name="suggested_image" id="suggested_image_input">
    </div>

    <div class="form-group">
        <label>Enter Secret Data to Hide:</label>
        <textarea name="text" rows="4" required placeholder="Type your secret message here..."></textarea>
    </div>

    <div class="form-group">
        <label>Enter Secret Key (AES):</label>
        <input type="password" name="key" required placeholder="Enter key (e.g. 16 characters)">
    </div>

    <button type="submit">Encrypt & Hide Data</button>
</form>

{% if download %}
<div class="result-box" style="text-align: center; background: rgba(0, 210, 255, 0.1); border: 1px solid #00d2ff;">
    <p>Encryption Successful!</p>
    <div style="margin: 1rem 0;">
        <p>Preview of Encrypted Image:</p>
        <img src="/download/{{ download }}" style="max-width: 100%; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
    </div>
    <a href="/download/{{ download }}" style="color: #00d2ff; font-weight: bold; text-decoration: none;">
        <button type="button" style="width: auto; padding: 0.5rem 2rem; background: #3a7bd5;">Download Encrypted Image</button>
    </a>
</div>
{% endif %}
{% endblock %}
