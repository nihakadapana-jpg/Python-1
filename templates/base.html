<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steganography AES</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('/static/background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }
        .overlay {
            background: rgba(0, 0, 0, 0.7);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            background: rgba(0, 0, 0, 0.8);
            padding: 1rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        nav a {
            color: #00d2ff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
        }
        nav a:hover {
            color: #3a7bd5;
        }
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1, h2 { text-align: center; color: #00d2ff; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; }
        input[type="text"], input[type="password"], textarea, input[type="file"] {
            width: 100%;
            padding: 0.8rem;
            border-radius: 5px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .suggestion-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 1rem;
        }
        .suggestion-item {
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 5px;
            overflow: hidden;
            height: 100px;
        }
        .suggestion-item.selected { border-color: #00d2ff; }
        .suggestion-item img { width: 100%; height: 100%; object-fit: cover; }
        .result-box {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            border-radius: 5px;
        }
        .footer { text-align: center; padding: 2rem; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="overlay">
        <nav>
            <a href="/">Home</a>
            <a href="/encrypt">Encryption</a>
            <a href="/decrypt">Decryption</a>
            <a href="/how-to-use">How to Use</a>
        </nav>
        
        <div class="container">
            {% block content %}{% endblock %}
        </div>

        <div class="footer">
            &copy; 2026 Steganography Web App - Secured with AES
        </div>
    </div>

    <script>
        function selectSuggestion(filename, element) {
            document.querySelectorAll('.suggestion-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('suggested_image_input').value = filename;
        }
    </script>
</body>
</html>
